services:
  api:
    image: ghcr.io/cbx0-dev/anistream-worker:latest
    pull_policy: always
    ports:
      - "8080:8080"
    volumes:
      - assets:/data/assets
    environment:
      SIDECAR_PATH: /app/sidecar
      ASSETS_PATH: /data/assets
      DATABASE_MIGRATION_PATH: /app/migration
      DATABASE_DRIVER: ${DATABASE_DRIVER}
      DATABASE_METADATA_CONNECTION_STRING: ${DATABASE_METADATA_CONNECTION_STRING}
      DATABASE_PROFILE_CONNECTION_STRING: ${DATABASE_PROFILE_CONNECTION_STRING}
    restart: unless-stopped

  worker:
    image: ghcr.io/cbx0-dev/anistream-worker:latest
    pull_policy: always
    volumes:
      - assets:/data/assets
    environment:
      SIDECAR_PATH: /app/sidecar
      ASSETS_PATH: /data/assets
      DATABASE_MIGRATION_PATH: /app/migration
      DATABASE_DRIVER: ${DATABASE_DRIVER}
      DATABASE_METADATA_CONNECTION_STRING: ${DATABASE_METADATA_CONNECTION_STRING}
      DATABASE_PROFILE_CONNECTION_STRING: ${DATABASE_PROFILE_CONNECTION_STRING}
    restart: unless-stopped

volumes:
  assets: