name: Build and Push Containers

on:
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Also tag and push as latest'
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

jobs:
  next-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next docker build tag
        id: compute
        run: |
          git fetch --tags
          last=$(git tag -l 'docker-build-*' | sed 's/docker-build-//' | sort -n | tail -1)
          next=$(( ${last:-0} + 1 ))
          tag="docker-build-${next}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          git tag "${tag}"
          git push origin "${tag}"

  build:
    needs: next-tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: api.Dockerfile
          - name: worker
            dockerfile: worker.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/anistream-${{ matrix.name }}:${{ needs.next-tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/anistream-${{ matrix.name }}:${{ github.sha }}
            ${{ inputs.push_latest && format('ghcr.io/{0}/anistream-{1}:latest', github.repository_owner, matrix.name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max